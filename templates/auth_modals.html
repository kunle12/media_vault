<!-- templates/auth_modals.html -->

<!-- Email Input Modal -->
<div id="emailModal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50" onclick="closeEmailModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 relative">
            <button onclick="closeEmailModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-semibold text-gray-900">Sign In to MediaVault</h2>
                <p class="text-sm text-gray-500 mt-1">Enter your email to receive a verification code</p>
            </div>
            
            <form id="emailForm" onsubmit="submitEmail(event)">
                <div class="mb-4">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="you@example.com" 
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        autocomplete="email"
                    >
                </div>
                
                <div id="emailError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-sm text-red-600" id="emailErrorText"></p>
                </div>
                
                <button 
                    type="submit" 
                    id="emailSubmitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Continue
                </button>
            </form>
            
            <p class="text-xs text-gray-400 text-center mt-4">
                We'll send a verification code to your email
            </p>
        </div>
    </div>
</div>

<!-- Code Input Modal (Apple Style) -->
<div id="codeModal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50" onclick="closeCodeModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 relative">
            <button onclick="closeCodeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-semibold text-gray-900">Enter Verification Code</h2>
                <p class="text-sm text-gray-500 mt-1">We sent a code to <span id="codeEmailDisplay" class="font-medium"></span></p>
            </div>
            
            <div class="mb-4">
                <div class="flex justify-center gap-2" id="codeInputs">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="0">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="1">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="2">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="3">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="4">
                    <input type="text" maxlength="1" class="code-input w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" data-index="5">
                </div>
            </div>
            
            <div id="codeError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-sm text-red-600" id="codeErrorText"></p>
            </div>
            
            <div id="codeSuccess" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                <p class="text-sm text-green-600">Code verified! Redirecting...</p>
            </div>
            
            <button 
                type="button" 
                id="codeSubmitBtn"
                onclick="submitCode()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Verify
            </button>
            
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="showEmailModal()" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
                    Change email
                </button>
                <span class="text-gray-300">|</span>
                <button onclick="resendCode()" id="resendBtn" class="text-sm text-gray-400 hover:text-gray-600 font-medium disabled:cursor-not-allowed" disabled>
                    Resend code
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Failure Modal -->
<div id="failureModal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Unable to Verify</h2>
            <p class="text-sm text-gray-500 mb-6" id="failureMessage">
                Too many failed attempts. Please start over.
            </p>
            <button 
                onclick="restartAuth()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition"
            >
                Start Over
            </button>
        </div>
    </div>
</div>

<script>
let currentEmail = '';
let codeTimeout = null;
let resendTimeout = null;

function showEmailModal() {
    document.getElementById('emailModal').classList.remove('hidden');
    document.getElementById('codeModal').classList.add('hidden');
    document.getElementById('failureModal').classList.add('hidden');
    document.getElementById('emailInput').focus();
}

function closeEmailModal() {
    document.getElementById('emailModal').classList.add('hidden');
    hideEmailError();
}

function closeCodeModal() {
    document.getElementById('codeModal').classList.add('hidden');
}

function showCodeModal(email) {
    currentEmail = email;
    document.getElementById('emailModal').classList.add('hidden');
    document.getElementById('codeModal').classList.remove('hidden');
    document.getElementById('failureModal').classList.add('hidden');
    document.getElementById('codeEmailDisplay').textContent = email;
    document.getElementById('codeError').classList.add('hidden');
    document.getElementById('codeSuccess').classList.add('hidden');
    clearCodeInputs();
    enableResendTimer();
    setTimeout(() => document.querySelector('.code-input').focus(), 100);
}

function showFailureModal(message) {
    document.getElementById('failureModal').classList.remove('hidden');
    document.getElementById('emailModal').classList.add('hidden');
    document.getElementById('codeModal').classList.add('hidden');
    document.getElementById('failureMessage').textContent = message;
}

function restartAuth() {
    document.getElementById('failureModal').classList.add('hidden');
    showEmailModal();
}

function hideEmailError() {
    document.getElementById('emailError').classList.add('hidden');
}

function showEmailError(message) {
    document.getElementById('emailErrorText').textContent = message;
    document.getElementById('emailError').classList.remove('hidden');
}

async function submitEmail(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const btn = document.getElementById('emailSubmitBtn');
    
    btn.disabled = true;
    btn.textContent = 'Sending...';
    hideEmailError();
    
    try {
        const response = await fetch('/auth/request-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showCodeModal(email);
        } else {
            showEmailError(data.error);
        }
    } catch (err) {
        showEmailError('An error occurred. Please try again.');
    }
    
    btn.disabled = false;
    btn.textContent = 'Continue';
}

function clearCodeInputs() {
    document.querySelectorAll('.code-input').forEach(input => {
        input.value = '';
        input.classList.remove('border-red-500', 'border-green-500');
    });
}

async function submitCode() {
    const code = Array.from(document.querySelectorAll('.code-input'))
        .map(input => input.value)
        .join('');
    
    if (code.length !== 6) {
        showCodeError('Please enter all 6 characters');
        return;
    }
    
    const btn = document.getElementById('codeSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying...';
    
    try {
        const response = await fetch('/auth/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, code })
        });
        
        const data = await response.json();
        
        if (data.success) {
            document.getElementById('codeSuccess').classList.remove('hidden');
            document.querySelectorAll('.code-input').forEach(input => {
                input.classList.add('border-green-500');
            });
            window.location.reload();
        } else {
            if (data.expired || data.locked) {
                showFailureModal(data.error);
            } else {
                showCodeError(data.error);
                clearCodeInputs();
                document.querySelector('.code-input').focus();
            }
        }
    } catch (err) {
        showCodeError('An error occurred. Please try again.');
    }
    
    btn.disabled = false;
    btn.textContent = 'Verify';
}

function showCodeError(message) {
    document.getElementById('codeErrorText').textContent = message;
    document.getElementById('codeError').classList.remove('hidden');
    document.querySelectorAll('.code-input').forEach(input => {
        input.classList.add('border-red-500');
    });
}

function enableResendTimer() {
    const resendBtn = document.getElementById('resendBtn');
    resendBtn.disabled = true;
    resendBtn.textContent = 'Resend code (30s)';
    
    let countdown = 30;
    if (resendTimeout) clearInterval(resendTimeout);
    
    resendTimeout = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
            clearInterval(resendTimeout);
            resendBtn.disabled = false;
            resendBtn.textContent = 'Resend code';
        } else {
            resendBtn.textContent = `Resend code (${countdown}s)`;
        }
    }, 1000);
}

async function resendCode() {
    const btn = document.getElementById('resendBtn');
    btn.disabled = true;
    
    try {
        const response = await fetch('/auth/request-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail })
        });
        
        const data = await response.json();
        
        if (data.success) {
            enableResendTimer();
            clearCodeInputs();
            document.querySelector('.code-input').focus();
        } else {
            showCodeError(data.error);
        }
    } catch (err) {
        showCodeError('Failed to resend code. Please try again.');
    }
}

// Code input handling
document.addEventListener('DOMContentLoaded', function() {
    const codeInputs = document.querySelectorAll('.code-input');
    
    codeInputs.forEach((input, index) => {
        input.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            this.classList.remove('border-red-500', 'border-green-500');
            document.getElementById('codeError').classList.add('hidden');
            
            if (this.value && index < codeInputs.length - 1) {
                codeInputs[index + 1].focus();
            }
        });
        
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !this.value && index > 0) {
                codeInputs[index - 1].focus();
            }
        });
        
        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const paste = (e.clipboardData.getData('text') || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
            const chars = paste.slice(0, 6).split('');
            chars.forEach((char, i) => {
                if (codeInputs[i]) codeInputs[i].value = char;
            });
            if (chars.length > 0) {
                codeInputs[Math.min(chars.length, 5)].focus();
            }
        });
    });
});

// Check auth status on page load
async function checkAuth() {
    try {
        const response = await fetch('/auth/status');
        const data = await response.json();
        return data.authenticated;
    } catch {
        return false;
    }
}
</script>
